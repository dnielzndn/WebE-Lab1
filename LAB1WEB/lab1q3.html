<!DOCTYPE html>  
	<html> 
	<head>
		<meta charset="UTF-8">
		<meta name="description" content="Lab 1 Question 1">
		<meta name="keywords" content="HTML">
		<meta name="author" content="Ahmad Danial">
		<title>lab1Q2</title>
	</head>
	<body>
	<form style="border: 1px solid black; padding: 20px; width: 580px;">
    <table>
        <tr>
            <td colspan="2" align="center">
                <h2>Your Personal Details</h2>
            </td>
        </tr>
        <tr>
            <td>
				<b>Your name:</b>
			</td>
            <td>
				<input type="text" name="fullname" style="width: 400px;">
			</td>
        </tr>
        <tr>
            <td>
				<b>Student number:</b>
			</td>
            <td>
				<input type="text" name="stdid" style="width: 200px;">
			</td>
        </tr>
        <tr>
            <td>
				<b>Program:</b>
			</td>
            <td>
                <select name="program" style="width: 420px;">
                    <option selected="selected">Bachelor of Computer Science (Software Engineering) with Honours</option>
                    <option>Bachelor of Computer Science (Computer System & Networking) with Honours</option>
                    <option>Bachelor of Computer Science (Graphics & Multimedia Technology) with Honours</option>
                </select>
            </td>
        </tr>
        <tr>
            <td>
				<b>Gender:</b>
			</td>
            <td>
                <input type="radio" name="gender" value="male"> Male
                <input type="radio" name="gender" value="female"> Female
            </td>
        </tr>
        <tr>
            <td>
				<b>Hobby:</b>
			</td>
            <td>
                <input type="checkbox" name="hobby" value="Reading"> Reading
                <input type="checkbox" name="hobby" value="Outdoor Activities"> Outdoor Activities
                <input type="checkbox" name="hobby" value="Watching TV"> Watching TV
                <input type="checkbox" name="hobby" value="Sleeping"> Sleeping
            </td>
        </tr>
        <tr>
            <td valign="top">
				<b>Comments:</b>
			</td>
            <td>
				<textarea name="comments" rows="4" cols="30">
			</textarea></td>
        </tr>
        <tr>
            <td colspan="2">
                <input type="submit" value="Submit">
                <input type="reset" value="Reset">
            </td>
        </tr>
		</table>
	</form>


	
	</body>
	</html>
